<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>扣子 多Agent</title>
<style>
:root {
  --bg: #0b0b12;
  --surface: #151525;
  --border: #252540;
  --primary: #7c3aed;
  --primary-glow: #a78bfa;
  --text: #d4d4d8;
  --text-dim: #71717a;
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── 工具栏 ── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.toolbar .brand  { font-size:14px; font-weight:700; color:var(--primary); }
.toolbar .pipe   { color:var(--text-dim); }
.toolbar .model-badge {
  margin-left: auto;
  font-size: 11px;
  color: var(--text-dim);
  background: rgba(124,58,237,.12);
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid rgba(124,58,237,.2);
}
.toolbar .gear-btn {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 18px;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: var(--radius);
  transition: color .2s;
}
.toolbar .gear-btn:hover { color: var(--primary); }

/* ── 设置面板 ── */
.settings-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.65);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
}
.settings-overlay.show { opacity:1; pointer-events:auto; }
.settings-panel {
  width: 100%;
  max-width: 440px;
  background: var(--surface);
  border-radius: 16px 16px 0 0;
  padding: 20px 18px 28px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.22,.61,.36,1);
}
.settings-overlay.show .settings-panel { transform: translateY(0); }
.settings-panel h3 {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  text-align: center;
}
.settings-panel label {
  font-size: 12px;
  color: var(--text-dim);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.settings-panel input, .settings-panel select {
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  outline: none;
}
.settings-panel input:focus, .settings-panel select:focus { border-color: var(--primary); }
.settings-panel .btn-row {
  display: flex;
  gap: 10px;
}
.settings-panel .btn-row button {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-ghost   { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
.hint { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

/* ── 对话区 ── */
.conversation {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}
.conversation::-webkit-scrollbar { width: 4px; }
.conversation::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.bubble {
  max-width: 88%;
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 13.5px;
  line-height: 1.6;
  word-break: break-word;
  animation: slideIn .25s ease;
}
.bubble.user {
  align-self: flex-end;
  background: var(--primary);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.bubble.agent {
  align-self: flex-start;
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.bubble.system {
  align-self: center;
  background: transparent;
  color: var(--text-dim);
  font-size: 12px;
  padding: 6px 10px;
}
.agent-label {
  font-size: 10px;
  color: var(--primary-glow);
  font-weight: 600;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.agent-label::before {
  content: "";
  width: 6px;
  height: 6px;
  background: var(--primary);
  border-radius: 50%;
}

.typing {
  align-self: flex-start;
  display: flex;
  gap: 5px;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  border-bottom-left-radius: 4px;
}
.typing span {
  width: 7px;
  height: 7px;
  background: var(--primary);
  border-radius: 50%;
  animation: bounce 1.2s infinite ease-in-out;
}
.typing span:nth-child(2) { animation-delay: .15s; }
.typing span:nth-child(3) { animation-delay: .3s; }

/* ── 输入栏 ── */
.input-bar {
  display: flex;
  gap: 8px;
  padding: 10px 14px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.input-bar input {
  flex: 1;
  padding: 10px 16px;
  border-radius: 22px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
}
.input-bar input:focus { border-color: var(--primary); }
.input-bar button {
  padding: 10px 20px;
  border-radius: 22px;
  border: none;
  background: var(--primary);
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}

@keyframes slideIn { from { opacity:0; transform:translateY(8px); } }
@keyframes bounce { 0%,80%,100% { transform:scale(0); } 40% { transform:scale(1); } }
</style>
</head>
<body>

<!-- 工具栏 -->
<div class="toolbar">
  <span class="brand">父Bot</span>
  <span class="pipe">→</span>
  <span>子Agent 集群</span>
  <span class="model-badge" id="modelBadge">本地模拟</span>
  <button class="gear-btn" onclick="toggleSettings()" title="设置">&#9881;</button>
</div>

<!-- 设置面板 -->
<div class="settings-overlay" id="settingsOverlay" onclick="if(event.target===this)toggleSettings()">
  <div class="settings-panel" onclick="event.stopPropagation()">
    <h3>API 设置</h3>
    <label>
      模型
      <select id="modelSelect">
        <option value="deepseek-v3">DeepSeek-V3</option>
        <option value="deepseek-r1">DeepSeek-R1</option>
        <option value="qwen25-32b">Qwen2.5-32B</option>
        <option value="qwen25-7b">Qwen2.5-7B</option>
        <option value="glm4-9b">GLM-4-9B</option>
        <option value="llama3-8b">Llama3.1-8B</option>
      </select>
    </label>
    <label>
      SiliconFlow API Key
      <input id="keyInput" type="password" placeholder="sk-..." autocomplete="off">
      <span class="hint">去 <a href="https://siliconflow.cn" target="_blank">siliconflow.cn</a> 注册免费获取</span>
    </label>
    <div class="btn-row">
      <button class="btn-ghost" onclick="toggleSettings()">取消</button>
      <button class="btn-primary" onclick="saveKey()">保存并切换</button>
    </div>
    <span id="keyStatus" style="font-size:12px;text-align:center;color:var(--text-dim)"></span>
  </div>
</div>

<!-- 对话区 -->
<div class="conversation" id="conv">
  <div class="bubble system">/help 查看命令 &nbsp;|&nbsp; /agents 查看子Agent &nbsp;|&nbsp; &#9881; 设置 Key</div>
</div>

<!-- 输入栏 -->
<div class="input-bar">
  <input id="input" placeholder="输入消息…" autofocus onkeydown="if(event.key==='Enter')send()">
  <button onclick="send()">发送</button>
</div>

<script>
const API = (() => {
  const u = new URL(window.location.href);
  return u.protocol + '//' + u.hostname + ':8900';
})();

const conv = document.getElementById('conv');
const inp  = document.getElementById('input');
const badge = document.getElementById('modelBadge');

// ── 设置面板 ──
function toggleSettings() {
  document.getElementById('settingsOverlay').classList.toggle('show');
}
async function saveKey() {
  const key = document.getElementById('keyInput').value.trim();
  const model = document.getElementById('modelSelect').value;
  const st = document.getElementById('keyStatus');
  if (!key) { st.textContent = '请输入 Key'; return; }
  st.textContent = '设置中…';
  try {
    const r = await fetch(API + '/set-key', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({key, model})
    });
    const d = await r.json();
    if (d.ok) {
      badge.textContent = d.model;
      st.textContent = '已切换: ' + d.model;
      setTimeout(toggleSettings, 800);
    } else {
      st.textContent = '失败: ' + (d.error||'未知');
    }
  } catch(e) { st.textContent = '请求失败，API未启动'; }
}

// ── 对话 ──
async function send() {
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  addBubble('user', text);
  const typingEl = addTyping();
  try {
    const r = await fetch(API + '/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({msg: text})
    });
    const d = await r.json();
    typingEl.remove();
    if (d.cmd) addBubble('system', d.reply.replace(/\n/g,'<br>'));
    else addBubble('agent', d.reply, d.agent);
    if (d.model) badge.textContent = d.model;
  } catch(e) {
    typingEl.remove();
    addBubble('system', '请求失败，请确认 API 已启动 (' + API + ')');
  }
}

function addBubble(role, content, agentName) {
  const d = document.createElement('div');
  d.className = 'bubble ' + role;
  d.innerHTML = agentName
    ? '<div class="agent-label">' + agentName + '</div>' + content
    : content;
  conv.appendChild(d);
  d.scrollIntoView({behavior:'smooth'});
}

function addTyping() {
  const d = document.createElement('div');
  d.className = 'typing';
  d.innerHTML = '<span></span><span></span><span></span>';
  conv.appendChild(d);
  d.scrollIntoView({behavior:'smooth'});
  return d;
}
</script>
</body>
</html>
